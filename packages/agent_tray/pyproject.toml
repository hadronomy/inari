[project]
name = "inari-tray"
version = "1.20.0-alpha.4"
description = "Cross-platform Inari Device Center and tray companion"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1",
  "inari",
  "inari-brand",
  "keyring>=25.7.0",
  "pillow>=12.2.0",
  "platformdirs>=4.4.0",
  "pydantic-settings>=2.13.1",
  "PySide6>=6.9.1",
  "pywin32>=306 ; sys_platform == 'win32'",
  "websockets>=16.0",
]

[dependency-groups]
dev = [
  "pytest>=9.0.3,<10.0.0",
  "anyio>=4.13.0,<5.0.0",
  "pytest-cov>=6.2.1,<7.0.0",
  "pytest-xdist>=3.8.0,<4.0.0",
  "respx>=0.22.0,<1.0.0",
  "pytest-mock>=3.14.1,<4.0.0",
  "hypothesis>=6.151.0,<7.0.0",
  "pytest-timeout>=2.4.0,<3.0.0",
  "ruff>=0.15.11",
]

[project.scripts]
inari-tray = "inari_tray.main:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["inari_tray*"]
exclude = ["tests*"]

[tool.uv.sources]
inari = { workspace = true }
inari-brand = { workspace = true }



