[project]
name = "iot-agent-tray"
version = "0.3.0a1"
description = "Cross-platform tray companion for the IoT Agent"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1",
  "iot-agent",
  "pillow>=11.3.0",
  "pydantic-settings>=2.13.1",
  "PySide6>=6.9.1",
  "pywin32>=306 ; sys_platform == 'win32'",
  "websockets>=16.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.5,<9.0.0",
  "anyio>=4.13.0,<5.0.0",
  "pytest-cov>=6.2.1,<7.0.0",
  "pytest-xdist>=3.8.0,<4.0.0",
  "respx>=0.22.0,<1.0.0",
  "pytest-mock>=3.14.1,<4.0.0",
  "hypothesis>=6.151.0,<7.0.0",
  "pytest-timeout>=2.4.0,<3.0.0",
]

[project.scripts]
iot-agent-tray = "iot_agent_tray.main:main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["iot_agent_tray*"]
exclude = ["tests*"]

[tool.uv.sources]
iot-agent = { workspace = true }
