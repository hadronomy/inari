[project]
name = "inari"
version = "1.20.0-alpha.4"
description = "Extensible local hardware bridge for POS and local devices"
requires-python = ">=3.12"
dependencies = [
  "alembic>=1.16.5,<2.0.0",
  "fastapi>=0.115.0,<1.0.0",
  "uvicorn[standard]>=0.30.0,<1.0.0",
  "pydantic>=2.8.0,<3.0.0",
  "dishka>=1.9.1,<2.0.0",
  "sqlalchemy>=2.0.44,<3.0.0",
  "typer>=0.19.2,<1.0.0",
  "pillow>=12.2.0",
  "puremagic>=2.0.0,<3.0.0",
  "pywin32>=306; platform_system == 'Windows'",
  "httpx>=0.28.1",
  "cryptography>=46.0.5",
  "joserfc>=1.6.3",
  "keyring>=25.7.0",
  "platformdirs>=4.4.0",
  "tomli-w>=1.2.0,<2.0.0",
  "scalar-fastapi>=1.8.2",
  "eclipse-zenoh>=1.9.0,<2.0.0",
]

[project.optional-dependencies]
cups = ["pycups>=2.0.4; platform_system != 'Windows'"]

[dependency-groups]
dev = [
  "pytest>=9.0.3,<10.0.0",
  "anyio>=4.13.0,<5.0.0",
  "asgi-lifespan>=2.1.0,<3.0.0",
  "httpx2>=2.0.0,<3.0.0",
  "pytest-cov>=6.2.1,<7.0.0",
  "pytest-xdist>=3.8.0,<4.0.0",
  "respx>=0.22.0,<1.0.0",
  "pytest-mock>=3.14.1,<4.0.0",
  "hypothesis>=6.151.0,<7.0.0",
  "pytest-timeout>=2.4.0,<3.0.0",
  "ruff>=0.15.11",
]

[project.scripts]
inari = "inari.cli:main"
inari-windows-service = "inari.host_service.windows_entrypoint:main"
inari-generate-config = "inari.config:generate_schema_main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["inari*"]
exclude = ["notebooks*", "tests*"]

[tool.setuptools.package-data]
inari = ["db/alembic/script.py.mako"]



