[project]
name = "iot-agent"
version = "1.15.0a1"
description = "Extensible local hardware bridge for POS and local devices"
requires-python = ">=3.12"
dependencies = [
  "fastapi>=0.115.0,<1.0.0",
  "uvicorn[standard]>=0.30.0,<1.0.0",
  "pydantic>=2.8.0,<3.0.0",
  "pillow>=10.4.0,<12.0.0",
  "puremagic>=2.0.0,<3.0.0",
  "pywin32>=306; platform_system == 'Windows'",
  "httpx>=0.28.1",
  "cryptography>=46.0.5",
  "joserfc>=1.6.3",
  "keyring>=25.7.0",
  "platformdirs>=4.4.0",
  "scalar-fastapi>=1.8.2",
  "websockets>=16.0",
]

[project.optional-dependencies]
cups = [
  "pycups>=2.0.4; platform_system != 'Windows'",
]

[project.scripts]
iot-agent = "iot_agent.main:main"
iot-agent-generate-config = "iot_agent.config:generate_schema_main"

[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["iot_agent*"]
exclude = ["notebooks*", "tests*"]
