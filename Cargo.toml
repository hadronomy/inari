[workspace]
members  = ["crates/*"]
resolver = "3"

[workspace.package]
authors     = ["Pablo Hernandez <hadronomy@gmail.com> (https://hadronomy.com/)"]
description = "An iot agent"
edition     = "2024"
license     = "MIT"
publish     = false
repository  = "https://github.com/hadronomy/inari"
version     = "0.1.0-alpha.1"

[workspace.dependencies]
axum                  = { version = "0.8", features = ["http1", "json", "macros", "tokio"] }
base64                = "0.22"
bytes                 = "1.10"
chrono                = { version = "0.4.42", features = ["clock", "serde"] }
config                = "0.14"
humantime-serde       = "1.1"
http                  = "1.3"
rayon                 = "1.10"
serde                 = { version = "1", features = ["derive"] }
serde_json            = "1.0"
thiserror             = "2"
tokio                 = { version = "1", features = ["macros", "net", "rt-multi-thread", "signal", "sync", "time"] }
tokio-stream          = "0.1"
toml                  = "0.8"
tower                 = { version = "0.5", features = ["timeout", "util"] }
tower-http            = { version = "0.6", features = ["catch-panic", "compression-full", "cors", "request-id", "sensitive-headers", "trace"] }
tracing               = "0.1"
tracing-subscriber    = { version = "0.3", features = ["env-filter", "fmt", "json"] }
zenoh                 = "1"


[profile.release]
debug       = 1
incremental = true
lto         = true
opt-level   = 3
strip       = "none"

[profile.bench]
debug = true
strip = false

[profile.dev.package]
insta.opt-level   = 3
similar.opt-level = 3
