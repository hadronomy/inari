# Example inari-server configuration for a managed gateway controller.
#
# Keep secrets out of this file. Enrollment tokens are configured by SHA-256
# digest so the server never needs to persist bootstrap token plaintext.

config_version = 1

[server]
bind = "127.0.0.1:8080"
public_url = "https://controller.example.com"
# `preview` and `production` use distinct browser favicons and enforce the same
# deployed security posture. Local defaults use `development`.
environment = "production"

[database]
# Mounted from an existing Kubernetes Secret. The URL itself never belongs in
# this file or in Helm values.
url_file = "/var/run/secrets/inari/database-url"
# Set false when a Kubernetes migration Job owns schema changes before rollout.
migrate_on_startup = false
min_connections = 2
max_connections = 32

[organization]
id = "org_example"
name = "Example organization"
default_site_id = "site_headquarters"
default_site_name = "Headquarters"

[identity.oidc]
enabled = true
issuer_url = "https://identity.example.com"
client_id = "inari-controller"
client_secret_file = "/var/run/secrets/inari/oidc-client-secret"
scopes = ["openid", "profile", "email", "urn:zitadel:iam:org:project:roles"]
role_claim = "urn:zitadel:iam:org:project:roles"

[identity.oidc.role_mapping]
"inari.viewer" = "viewer"
"inari.operator" = "operator"
"inari.enrollment-admin" = "enrollment_admin"
"inari.administrator" = "administrator"

[http.zenoh_rest]
# The REST bridge is for operator diagnostics and local tests. Keep it disabled
# for production managed-gateway traffic.
enabled = false
allow_admin_space = false

[managed_gateway]
# Enable only after OIDC, public Zenoh endpoints, and TLS material are configured.
enabled = false
controller_name = "Inari Controller"
controller_instance_id = "controller-prod-1"
supported_protocol_versions = ["2026-07-12"]
controller_actions = [
  "system:read",
  "devices:read",
  "events:read",
  "jobs:create",
  "jobs:cancel",
  "commands:execute",
]
[managed_gateway.onboarding]
# The operator interface remains available while onboarding is disabled, but
# invitation actions render a typed unavailable state.
enabled = false
public_base_url = "https://controller.example.com"
invite_ttl = "10m"
failed_attempt_window = "1m"
max_failed_attempts = 5

[managed_gateway.data_plane]
# These are the endpoints returned to enrolled agents. In production they
# should be TLS-capable public router endpoints.
connect_endpoints = ["tls/controller.example.com:7447"]
namespace_prefix = "iot/v1/agents"
close_link_on_expiration = true

[managed_gateway.certificate]
# `step_ca` mints a fresh CSR-bound token only after controller enrollment has
# authenticated the agent. Mount the provisioner signing key from a Secret.
mode = "step_ca"
step_ca_base_url = "https://step-ca.example.com"
step_ca_root_fingerprint = "replace-with-root-sha256-fingerprint"
step_ca_provisioner = "inari-agents"
step_ca_key_id = "replace-with-provisioner-jwk-kid"
step_ca_signing_key_file = "/var/run/secrets/inari/step-ca-provisioner-key.pem"
step_ca_signing_algorithm = "ed_dsa"
step_ca_token_ttl = "5m"
requires_mutual_tls_after_issuance = true

[zenoh]
enabled = true
mode = "client"
connect_endpoints = ["tls/inari-zenoh:7447"]

[zenoh.admin_space]
enabled = false
read = true
write = false

[zenoh.tls]
root_ca_certificate = "/etc/inari/pki/root-ca.pem"
connect_certificate = "/etc/inari/pki/controller.pem"
connect_private_key = "/etc/inari/pki/controller-key.pem"
enable_mtls = true
close_link_on_expiration = true

[zenoh.access_control]
enabled = true
default_permission = "deny"
managed_gateway_namespace_prefix = "iot/v1/agents"
# Optional: narrow ACL subjects to certificate common names once enrollment
# policy fixes agent certificate subjects.
managed_gateway_cert_common_names = []
