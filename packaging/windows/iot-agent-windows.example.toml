config_version = 1

[identity]
package_id = "com.example.iotagent"
publisher = "CN=Example Publisher"
publisher_display_name = "Example Publisher"
display_name = "IoT Agent"
description = "Secure local IoT agent and tray companion."
version = "1.17.0.0"
architecture = "x64"
min_windows_version = "10.0.19041.0"
max_windows_version_tested = "10.0.26100.0"

[paths]
build_dir = "../../build/windows"
dist_dir = "../../dist/windows"
pyapp_source_dir = "../../vendor/pyapp"
python_distribution_path = "../../vendor/python/cpython-3.12-windows-x86_64-none.zip"
certificate_path = "../../certs/iot-agent-msix.pfx"

[tools]
uv = "uv"
cargo = "cargo"
makepri = "makepri"
makeappx = "makeappx"
signtool = "signtool"

[pyapp]
uv_enabled = true
uv_version = "0.9.5"
uv_only_bootstrap = false
vendor_transitive_wheels = true

[tray]
executable_name = "IoT Agent Tray.exe"
exec_spec = "iot_agent_tray.main:main"
app_id = "IoTAgentTray"
startup_task_enabled = false
startup_task_id = "IoTAgentTrayStartup"
startup_task_display_name = "IoT Agent Tray"

[service]
executable_name = "IoT Agent Service.exe"
exec_spec = "iot_agent.windows_service:main"
app_id = "IoTAgentServiceHost"
service_enabled = true
service_name = "IoTAgentService"
service_display_name = "IoT Agent"
service_description = "Secure local gateway service for IoT devices and the IoT Agent tray."
start_account = "localService"
startup_type = "auto"

[signing]
enabled = false
certificate_password_env_var = "MSIX_CERT_PASSWORD"
timestamp_url = "http://timestamp.digicert.com"
