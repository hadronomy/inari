name: Kubernetes distribution

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/kubernetes.yaml
      - deploy/**
      - docs/kubernetes.md
      - justfile
      - mise.toml
      - scripts/validate-kubernetes*.sh
  push:
    branches:
      - main
    paths:
      - .github/workflows/kubernetes.yaml
      - deploy/**
      - docs/kubernetes.md
      - justfile
      - mise.toml
      - scripts/validate-kubernetes*.sh

permissions: {}

concurrency:
  group: kubernetes-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, render, and validate
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: >-
            just
            actionlint
            helm@4.2.3
            helm@3.21.3
            kustomize
            kubeconform
            kube-linter
            shellcheck
            yamllint
            yq
            aqua:helm/chart-testing
            pipx:yamale
          cache: true

      - name: Validate Kubernetes distribution
        run: just check-kubernetes

      - name: Publish required check status
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: ./.github/actions/publish-check-status
        with:
          context: Lint, render, and validate
          description: Kubernetes distribution validation completed
          state: ${{ job.status }}
        env:
          GH_TOKEN: ${{ github.token }}

  api-server:
    name: Kubernetes API server
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: >-
            just
            helm
            kustomize
            kubectl
            aqua:kubernetes-sigs/kind
          cache: true

      - name: Validate against Kubernetes
        run: just check-kubernetes-server

      - name: Publish required check status
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: ./.github/actions/publish-check-status
        with:
          context: Kubernetes API server
          description: Kubernetes API-server validation completed
          state: ${{ job.status }}
        env:
          GH_TOKEN: ${{ github.token }}
