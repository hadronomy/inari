name: Tegami PR

on:
  workflow_dispatch:
    inputs:
      pull_request:
        description: Pull request to preview
        required: true
        type: number
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  statuses: write

jobs:
  preview:
    name: Release preview
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out pull request
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release packages
        run: bun run build:release

      - name: Create release preview
        run: >-
          node tooling/release/dist/cli.mjs pr preview
          --artifact tegami-pr-preview.md
          --number "${{ github.event.pull_request.number || inputs.pull_request }}"
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Upload preview
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tegami-pr-preview
          path: tegami-pr-preview.md
          if-no-files-found: error
          retention-days: 3

      - name: Publish required check status
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: ./.github/actions/publish-check-status
        with:
          context: Release preview
          description: Tegami release preview completed
          state: ${{ job.status }}
        env:
          GH_TOKEN: ${{ github.token }}
