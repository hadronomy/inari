name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  plan:
    name: Resolve release plan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
    outputs:
      publish: ${{ steps.plan.outputs.publish }}
      edge: ${{ steps.plan.outputs.edge }}
      controller_chart: ${{ steps.plan.outputs.controller_chart }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun cosign
          cache: true

      - name: Install release dependencies
        run: bun install --frozen-lockfile

      - name: Authenticate release status to GHCR
        shell: bash
        env:
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          printf '%s' "${REGISTRY_PASSWORD}" | cosign login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Resolve publish targets
        id: plan
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bun run build:release >/dev/null
          plan="$(node tooling/release/dist/cli.mjs workflow-plan)"
          {
            printf 'publish=%s\n' "$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(String(value.publish))' "${plan}")"
            printf 'edge=%s\n' "$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(String(value.edge))' "${plan}")"
            printf 'controller_chart=%s\n' "$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(String(value.controllerChart))' "${plan}")"
          } >>"${GITHUB_OUTPUT}"

  validate:
    name: Validate release tooling and chart
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: >-
            node
            bun
            just
            actionlint
            helm@4.2.3
            helm@3.21.3
            kustomize
            kubeconform
            kube-linter
            shellcheck
            yamllint
            yq
            aqua:helm/chart-testing
            pipx:yamale
          cache: true

      - name: Install release dependencies
        run: bun install --frozen-lockfile

      - name: Validate release packages
        run: just check-release

      - name: Validate Kubernetes distribution
        run: just check-kubernetes

  version:
    name: Open or update Version Packages PR
    if: needs.plan.outputs.publish == 'false'
    needs: [plan, validate]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      actions: write
      contents: write
      packages: read
      pull-requests: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun uv cosign
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Authenticate release status to GHCR
        shell: bash
        env:
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          printf '%s' "${REGISTRY_PASSWORD}" | cosign login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Version packages
        run: |
          bun run build:release
          node tooling/release/dist/cli.mjs cleanup
          node tooling/release/dist/cli.mjs ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Validate the generated version pull request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pull_request="$(
            gh pr list \
              --head tegami/version-packages \
              --state open \
              --json number \
              --jq '.[0].number'
          )"
          if [[ -z "${pull_request}" ]]; then
            printf 'Tegami did not leave an open Version Packages pull request.\n' >&2
            exit 1
          fi
          gh workflow run tegami-pr.yaml \
            --ref tegami/version-packages \
            --field "pull_request=${pull_request}"
          gh workflow run kubernetes.yaml --ref tegami/version-packages

  windows:
    name: Build signed Device Center
    if: needs.plan.outputs.publish == 'true' && needs.plan.outputs.edge == 'true'
    needs: [plan, validate]
    runs-on: windows-2025
    timeout-minutes: 30
    environment: windows-release
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned build tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: uv aqua:anchore/syft github:mtrojnar/osslsigncode
          cache: true

      # The frozen application must carry CPython's matching OpenSSL runtime.
      # Avoid resolving a same-named DLL from the runner-wide OpenSSL install.
      - name: Install the Windows CPython runtime
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13.14"
          architecture: x64

      - name: Materialize protected signing inputs
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          ROOT_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_ROOT_CERT_BASE64 }}
        run: |
          $Pfx = Join-Path $env:RUNNER_TEMP "inari-publisher.pfx"
          $Root = Join-Path $env:RUNNER_TEMP "hadronomy-code-signing-root.cer"
          [IO.File]::WriteAllBytes($Pfx, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          [IO.File]::WriteAllBytes($Root, [Convert]::FromBase64String($env:ROOT_CERTIFICATE_BASE64))
          "INARI_SIGNING_PFX=$Pfx" >> $env:GITHUB_ENV
          "INARI_CODE_SIGNING_ROOT_CERT=$Root" >> $env:GITHUB_ENV

      - name: Build and sign MSIX
        shell: pwsh
        env:
          INARI_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: ./deploy/windows/build.ps1

      - name: Locate Windows release bundle
        id: windows-release
        shell: pwsh
        run: |
          $Checksums = @(Get-ChildItem target/release/windows/*/SHA256SUMS -File)
          if ($Checksums.Count -ne 1) {
            throw "Expected exactly one Windows release checksum manifest."
          }
          $Release = $Checksums[0].Directory
          $Msix = @(Get-ChildItem $Release.FullName -Filter *.msix)
          $Sbom = @(Get-ChildItem $Release.FullName -Filter *.spdx.json)
          if ($Msix.Count -ne 1 -or $Sbom.Count -ne 1) {
            throw "Expected exactly one MSIX and one SPDX document."
          }
          $Assets = "$($Release.FullName.Replace('\', '/'))/*"
          "directory=$($Release.FullName)" >> $env:GITHUB_OUTPUT
          "assets=$Assets" >> $env:GITHUB_OUTPUT
          "msix=$($Msix[0].FullName)" >> $env:GITHUB_OUTPUT
          "sbom=$($Sbom[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Verify Windows machine trust
        shell: pwsh
        run: |
          $Release = "${{ steps.windows-release.outputs.directory }}"
          $Root = Join-Path $Release "hadronomy-code-signing-root.cer"
          $Issuer = Join-Path $Release "inari-code-signing-issuer.cer"
          ./deploy/windows/verify-machine-trust.ps1 `
            -Package "${{ steps.windows-release.outputs.msix }}" `
            -RootCertificate $Root `
            -IssuerCertificate $Issuer

      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.windows-release.outputs.assets }}

      - name: Attest MSIX software bill of materials
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: ${{ steps.windows-release.outputs.msix }}
          sbom-path: ${{ steps.windows-release.outputs.sbom }}

      - name: Upload edge release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inari-windows-release
          path: |
            target/release/windows/*/*.exe
            target/release/windows/*/*.msix
            target/release/windows/*/*.spdx.json
            target/release/windows/*/*.cer
            target/release/windows/*/*-fingerprint.txt
            target/release/windows/*/SHA256SUMS
          if-no-files-found: error
          retention-days: 3

      - name: Remove protected signing inputs
        if: always()
        shell: pwsh
        run: |
          if ($env:INARI_SIGNING_PFX) {
            Remove-Item $env:INARI_SIGNING_PFX -Force -ErrorAction SilentlyContinue
          }
          if ($env:INARI_CODE_SIGNING_ROOT_CERT) {
            Remove-Item $env:INARI_CODE_SIGNING_ROOT_CERT -Force -ErrorAction SilentlyContinue
          }

  publish:
    name: Publish release
    if: >-
      always() &&
      needs.plan.outputs.publish == 'true' &&
      needs.validate.result == 'success' &&
      (needs.windows.result == 'success' || needs.windows.result == 'skipped')
    needs: [plan, validate, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install release tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun uv helm@4.2.3 cosign
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Windows bundle
        if: needs.plan.outputs.edge == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inari-windows-release
          path: target/release/windows

      - name: Authenticate release tools to GHCR
        if: needs.plan.outputs.controller_chart == 'true'
        shell: bash
        env:
          REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          printf '%s' "${REGISTRY_PASSWORD}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin
          printf '%s' "${REGISTRY_PASSWORD}" | cosign login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Publish packages and release assets
        run: bun run release -- ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
