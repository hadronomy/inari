name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  plan:
    name: Resolve release plan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      publish: ${{ steps.plan.outputs.publish }}
      edge: ${{ steps.plan.outputs.edge }}
      controller_chart: ${{ steps.plan.outputs.controller_chart }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun
          cache: true

      - name: Install release dependencies
        run: bun install --frozen-lockfile

      - name: Resolve publish targets
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f .tegami/publish-lock.yaml ]]; then
            printf 'publish=false\nedge=false\ncontroller_chart=false\n' >>"${GITHUB_OUTPUT}"
            exit 0
          fi
          bun run build:release >/dev/null
          targets="$(node tooling/release/dist/cli.mjs targets)"
          {
            printf 'publish=true\n'
            printf 'edge=%s\n' "$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(String(value.edge))' "${targets}")"
            printf 'controller_chart=%s\n' "$(node -e 'const value=JSON.parse(process.argv[1]); process.stdout.write(String(value.controllerChart))' "${targets}")"
          } >>"${GITHUB_OUTPUT}"

  validate:
    name: Validate release tooling and chart
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: >-
            node
            bun
            just
            helm@4.2.3
            helm@3.21.3
            kustomize
            kubeconform
            kube-linter
            shellcheck
            yamllint
            yq
            aqua:helm/chart-testing
            pipx:yamale
          cache: true

      - name: Install release dependencies
        run: bun install --frozen-lockfile

      - name: Validate release packages
        run: just check-release

      - name: Validate Kubernetes distribution
        run: just check-kubernetes

  version:
    name: Open or update Version Packages PR
    if: needs.plan.outputs.publish == 'false'
    needs: [plan, validate]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun uv
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Version packages
        run: bun run release -- ci
        env:
          GITHUB_TOKEN: ${{ github.token }}

  windows:
    name: Build signed Device Center
    if: needs.plan.outputs.publish == 'true' && needs.plan.outputs.edge == 'true'
    needs: [plan, validate]
    runs-on: windows-2025
    timeout-minutes: 30
    environment: windows-release
    permissions:
      actions: read
      attestations: write
      contents: read
      id-token: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned build tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: python uv aqua:anchore/syft
          cache: true

      - name: Materialize protected signing inputs
        shell: pwsh
        env:
          SIGNING_PFX_BASE64: ${{ secrets.WINDOWS_SIGNING_PFX_BASE64 }}
          ROOT_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODE_SIGNING_ROOT_CERT_BASE64 }}
        run: |
          $Pfx = Join-Path $env:RUNNER_TEMP "inari-publisher.pfx"
          $Root = Join-Path $env:RUNNER_TEMP "inari-code-signing-root.cer"
          [IO.File]::WriteAllBytes($Pfx, [Convert]::FromBase64String($env:SIGNING_PFX_BASE64))
          [IO.File]::WriteAllBytes($Root, [Convert]::FromBase64String($env:ROOT_CERTIFICATE_BASE64))
          "INARI_SIGNING_PFX=$Pfx" >> $env:GITHUB_ENV
          "INARI_CODE_SIGNING_ROOT_CERT=$Root" >> $env:GITHUB_ENV

      - name: Build and sign MSIX
        shell: pwsh
        env:
          INARI_SIGNING_PASSWORD: ${{ secrets.WINDOWS_SIGNING_PFX_PASSWORD }}
        run: ./deploy/windows/build.ps1

      - name: Attest MSIX provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: target/release/windows/*/*.msix

      - name: Upload edge release bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inari-windows-release
          path: |
            target/release/windows/*/*.msix
            target/release/windows/*/*.spdx.json
            target/release/windows/*/*.cer
            target/release/windows/*/*-fingerprint.txt
            target/release/windows/*/SHA256SUMS
          if-no-files-found: error
          retention-days: 3

      - name: Remove protected signing inputs
        if: always()
        shell: pwsh
        run: |
          if ($env:INARI_SIGNING_PFX) {
            Remove-Item $env:INARI_SIGNING_PFX -Force -ErrorAction SilentlyContinue
          }
          if ($env:INARI_CODE_SIGNING_ROOT_CERT) {
            Remove-Item $env:INARI_CODE_SIGNING_ROOT_CERT -Force -ErrorAction SilentlyContinue
          }

  publish:
    name: Publish release
    if: >-
      always() &&
      needs.plan.outputs.publish == 'true' &&
      needs.validate.result == 'success' &&
      (needs.windows.result == 'success' || needs.windows.result == 'skipped')
    needs: [plan, validate, windows]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      packages: write
      pull-requests: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install release tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun uv helm@4.2.3 cosign
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download Windows bundle
        if: needs.plan.outputs.edge == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inari-windows-release
          path: target/release/windows

      - name: Authenticate Helm to GHCR
        if: needs.plan.outputs.controller_chart == 'true'
        shell: bash
        run: printf '%s' "${{ github.token }}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Publish packages and release assets
        run: bun run release -- ci
        env:
          GITHUB_TOKEN: ${{ github.token }}
