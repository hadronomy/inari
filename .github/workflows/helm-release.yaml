name: Publish Helm chart

on:
  push:
    tags:
      - helm-v*

permissions: {}

jobs:
  publish:
    name: Package, publish, and sign
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install pinned tools
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          install_args: helm@4.2.3 cosign
          cache: true

      - name: Verify release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          release_version="${GITHUB_REF_NAME#helm-v}"
          chart_version="$(helm show chart deploy/helm/inari | awk '/^version:/ { print $2 }')"
          if [[ "${release_version}" != "${chart_version}" ]]; then
            printf 'tag version %s does not match Chart.yaml version %s\n' "${release_version}" "${chart_version}" >&2
            exit 1
          fi
          printf 'version=%s\n' "${release_version}" >>"${GITHUB_OUTPUT}"

      - name: Package chart
        run: helm package deploy/helm/inari --destination dist

      - name: Authenticate to GHCR
        shell: bash
        run: printf '%s' "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Publish chart
        id: publish
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          output="$(helm push "dist/inari-${VERSION}.tgz" "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts")"
          printf '%s\n' "${output}"
          digest="$(awk '/^Digest:/ { print $2 }' <<<"${output}")"
          test -n "${digest}"
          printf 'digest=%s\n' "${digest}" >>"${GITHUB_OUTPUT}"

      - name: Sign OCI artifact
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.publish.outputs.digest }}
          VERSION: ${{ steps.version.outputs.version }}
        run: cosign sign --yes "ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/inari:${VERSION}@${DIGEST}"
