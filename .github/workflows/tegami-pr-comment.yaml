name: Tegami PR Comment

on:
  workflow_run:
    workflows: ["Tegami PR"]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment:
    name: Post release preview
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out trusted source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install release runtime
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: node bun
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release packages
        run: bun run build:release

      - name: Download untrusted preview artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tegami-pr-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: preview

      - name: Post preview comment
        run: node tooling/release/dist/cli.mjs pr comment preview/tegami-pr-preview.md
        env:
          GITHUB_TOKEN: ${{ github.token }}
