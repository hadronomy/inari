name: Desktop

on:
  pull_request:
    paths:
      - ".github/workflows/desktop.yaml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "contracts/**"
      - "crates/inari-agent-client/**"
      - "crates/inari-device-center/**"
      - "deploy/windows/**"
      - "packages/agent/inari/local_api/**"
      - "rust-toolchain.toml"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/desktop.yaml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "contracts/**"
      - "crates/inari-agent-client/**"
      - "crates/inari-device-center/**"
      - "deploy/windows/**"
      - "packages/agent/inari/local_api/**"
      - "rust-toolchain.toml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  client:
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Linux
            runner: ubuntu-24.04
          - platform: macOS
            runner: macos-15
          - platform: Windows
            runner: windows-2025
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Linux desktop libraries
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfontconfig1-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev

      - name: Install Rust components
        shell: bash
        run: |
          rustup component add clippy
          rustc --version
          cargo --version

      - name: Lint native client
        run: >-
          cargo clippy
          --locked
          --package inari-agent-client
          --package inari-device-center
          --all-targets
          --all-features
          --
          -D warnings

      - name: Test native client
        run: >-
          cargo test
          --locked
          --package inari-agent-client
          --package inari-device-center
