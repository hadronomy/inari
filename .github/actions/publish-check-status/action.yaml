---
name: Publish required check status
description: Attach a workflow-dispatch result to the pull request commit.

inputs:
  context:
    description: Required-check context to publish.
    required: true
  description:
    description: Short result summary shown by GitHub.
    required: true
  state:
    description: GitHub Actions job status.
    required: true
runs:
  using: composite
  steps:
    - name: Publish commit status
      shell: bash
      env:
        CHECK_CONTEXT: ${{ inputs.context }}
        CHECK_DESCRIPTION: ${{ inputs.description }}
        CHECK_STATE: ${{ inputs.state }}
      run: |
        case "${CHECK_STATE}" in
          success) status=success ;;
          failure) status=failure ;;
          *) status=error ;;
        esac
        target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
        target_url="${target_url}/actions/runs/${GITHUB_RUN_ID}"

        gh api \
          --method POST \
          "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
          -f context="${CHECK_CONTEXT}" \
          -f description="${CHECK_DESCRIPTION}" \
          -f state="${status}" \
          -f target_url="${target_url}"
