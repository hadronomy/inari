apiVersion: v2
name: inari
description: Production deployment for the Inari private device controller and Zenoh data plane
type: application
version: 0.2.1
appVersion: "0.1.0-alpha.1"
kubeVersion: ">=1.29.0-0"
home: https://github.com/hadronomy/inari
icon: https://raw.githubusercontent.com/hadronomy/inari/main/packages/brand/inari_brand/assets/inari-app-icon.svg
sources:
  - https://github.com/hadronomy/inari
maintainers:
  - name: hadronomy
    url: https://github.com/hadronomy
keywords:
  - device-management
  - iot
  - odoo
  - zenoh
annotations:
  artifacthub.io/category: integration-delivery
  artifacthub.io/license: MIT
  artifacthub.io/prerelease: "true"
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/hadronomy/inari
    - name: Support
      url: https://github.com/hadronomy/inari/issues
    - name: Kubernetes operations guide
      url: https://github.com/hadronomy/inari/blob/main/docs/kubernetes.md
  artifacthub.io/images: |
    - name: inari-server
      image: ghcr.io/hadronomy/inari-server:0.1.0-alpha.1
    - name: zenoh
      image: eclipse/zenoh:1.9.0
    - name: release-test
      image: busybox:1.37.0
  artifacthub.io/changes: |
    - kind: added
      description: Applied the unified Inari identity across controller, tray, documentation, and packaging surfaces.
    - kind: changed
      description: Introduced the production PostgreSQL, OIDC, migration, and standalone Zenoh topology.
    - kind: added
      description: Added strict values validation, restricted workload defaults, and Kustomize support.
