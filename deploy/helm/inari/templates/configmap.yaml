apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "inari.fullname" . }}
  labels:
    {{- include "inari.labels" . | nindent 4 }}
data:
  inari-server.toml: |
    config_version = 1

    [server]
    bind = "0.0.0.0:8080"
    public_url = {{ .Values.server.publicUrl | quote }}
    production = true

    [database]
    url_file = "/var/run/secrets/inari/database/url"
    migrate_on_startup = false
    min_connections = 2
    max_connections = 32

    [organization]
    id = {{ .Values.organization.id | quote }}
    name = {{ .Values.organization.name | quote }}
    default_site_id = {{ .Values.organization.defaultSiteId | quote }}
    default_site_name = {{ .Values.organization.defaultSiteName | quote }}

    [identity.oidc]
    enabled = true
    issuer_url = {{ .Values.identity.issuerUrl | quote }}
    client_id = {{ .Values.identity.clientId | quote }}
    client_secret_file = "/var/run/secrets/inari/oidc/client-secret"
    scopes = ["openid", "profile", "email", "urn:zitadel:iam:org:project:roles"]
    role_claim = {{ .Values.identity.roleClaim | quote }}

    [identity.oidc.role_mapping]
    {{- range $claim, $role := .Values.identity.roleMapping }}
    {{ $claim | quote }} = {{ $role | quote }}
    {{- end }}

    [managed_gateway]
    enabled = true
    controller_name = {{ .Values.managedGateway.controllerName | quote }}
    controller_instance_id = {{ .Values.managedGateway.controllerInstanceId | quote }}
    supported_protocol_versions = ["2026-07-12"]
    controller_actions = ["system:read", "devices:read", "events:read", "jobs:create", "jobs:cancel", "commands:execute"]

    [managed_gateway.onboarding]
    enabled = true
    public_base_url = {{ .Values.server.publicUrl | quote }}
    invite_ttl = {{ .Values.managedGateway.invitationTtl | quote }}

    [managed_gateway.data_plane]
    connect_endpoints = {{ .Values.managedGateway.zenohPublicEndpoints | toJson }}
    namespace_prefix = "iot/v1/agents"
    close_link_on_expiration = true

    [managed_gateway.certificate]
    mode = "step_ca"
    step_ca_base_url = {{ .Values.managedGateway.stepCa.baseUrl | quote }}
    step_ca_root_fingerprint = {{ .Values.managedGateway.stepCa.rootFingerprint | quote }}
    step_ca_provisioner = {{ .Values.managedGateway.stepCa.provisioner | quote }}
    step_ca_key_id = {{ .Values.managedGateway.stepCa.keyId | quote }}
    step_ca_signing_key_file = "/var/run/secrets/inari/step-ca/provisioner-key.pem"
    step_ca_signing_algorithm = {{ .Values.managedGateway.stepCa.signingAlgorithm | quote }}
    requires_mutual_tls_after_issuance = true

    [zenoh]
    enabled = true
    mode = "client"
    connect_endpoints = ["tls/{{ include "inari.fullname" . }}-zenoh:{{ .Values.zenoh.service.port }}"]

    [zenoh.tls]
    root_ca_certificate = "/var/run/secrets/inari/zenoh/ca.crt"
    connect_certificate = "/var/run/secrets/inari/zenoh/tls.crt"
    connect_private_key = "/var/run/secrets/inari/zenoh/tls.key"
    enable_mtls = true
    close_link_on_expiration = true

    [zenoh.access_control]
    enabled = true
    default_permission = "deny"
    managed_gateway_namespace_prefix = "iot/v1/agents"
