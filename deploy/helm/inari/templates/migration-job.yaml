{{- if .Values.migrations.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "inari.migrationJobName" . }}
  labels:
    {{- include "inari.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    {{- if .Values.migrations.helmHook }}
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    {{- end }}
    {{- with .Values.commonAnnotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migrations.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "inari.componentSelectorLabels" (dict "root" . "component" "migration") | nindent 8 }}
        {{- with .Values.migrations.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.migrations.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "inari.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.controller.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: migrate
          image: {{ include "inari.controllerImage" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - database
            - migrate
          securityContext:
            {{- toYaml .Values.controller.containerSecurityContext | nindent 12 }}
          env:
            - name: INARI_SERVER_DATABASE__URL_FILE
              value: /var/run/secrets/inari/database/url
          volumeMounts:
            - name: database
              mountPath: /var/run/secrets/inari/database
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.migrations.resources | nindent 12 }}
      volumes:
        - name: database
          secret:
            secretName: {{ .Values.database.secret.name }}
            items:
              - key: {{ .Values.database.secret.key }}
                path: url
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.controller.tmpSizeLimit }}
{{- end }}
