apiVersion: v1
kind: Service
metadata:
  name: {{ include "inari.fullname" . }}-zenoh
  labels:
    {{- include "inari.labels" . | nindent 4 }}
    app.kubernetes.io/component: zenoh
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: {{ include "inari.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: zenoh
  ports:
    - name: zenoh-tls
      port: {{ .Values.zenoh.service.port }}
      targetPort: zenoh-tls
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "inari.fullname" . }}-zenoh
  labels:
    {{- include "inari.labels" . | nindent 4 }}
    app.kubernetes.io/component: zenoh
spec:
  serviceName: {{ include "inari.fullname" . }}-zenoh
  replicas: {{ .Values.zenoh.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "inari.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: zenoh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "inari.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: zenoh
    spec:
      serviceAccountName: {{ include "inari.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: zenoh
          image: "{{ .Values.zenoh.image.repository }}:{{ .Values.zenoh.image.tag }}"
          imagePullPolicy: {{ .Values.zenoh.image.pullPolicy }}
          args: ["--config", "/etc/zenoh/{{ .Values.zenoh.configKey }}"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          ports:
            - name: zenoh-tls
              containerPort: {{ .Values.zenoh.service.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/zenoh
              readOnly: true
            - name: data
              mountPath: /var/lib/zenoh
            - name: tls
              mountPath: /etc/zenoh/tls
              readOnly: true
            - name: tmp
              mountPath: /tmp
          startupProbe:
            tcpSocket:
              port: zenoh-tls
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            tcpSocket:
              port: zenoh-tls
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: zenoh-tls
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: {{ .Values.zenoh.existingConfigMap }}
        - name: tls
          secret:
            secretName: {{ .Values.secrets.zenohTls.name }}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.zenoh.storage.storageClass }}
        storageClassName: {{ .Values.zenoh.storage.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.zenoh.storage.size }}
