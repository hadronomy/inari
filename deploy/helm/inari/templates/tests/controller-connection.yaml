{{- if .Values.tests.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "inari.fullname" . }}-test-connection
  labels:
    {{- include "inari.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    helm.sh/hook: test
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: health
      image: {{ include "inari.testImage" . | quote }}
      imagePullPolicy: {{ .Values.tests.image.pullPolicy }}
      command:
        - /bin/sh
        - -ec
      args:
        - wget --quiet --output-document=- http://{{ include "inari.fullname" . }}:{{ .Values.service.port }}/healthz && wget --quiet --output-document=- http://{{ include "inari.fullname" . }}:{{ .Values.service.port }}/readyz
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
        limits:
          memory: 32Mi
{{- end }}
